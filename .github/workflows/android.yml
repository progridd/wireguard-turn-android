name: Android CI (Manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Debug versions
      run: |
        java -version
        go version

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew :ui:assembleRelease --stacktrace

    - name: Get version from gradle.properties
      id: version
      run: |
        VERSION_NAME=$(grep wireguardVersionName gradle.properties | cut -d'=' -f2)
        echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "Version: $VERSION_NAME"

    - name: Rename APK
      run: mv ui/build/outputs/apk/release/ui-release.apk ui/build/outputs/apk/release/wg-turn-v${{ steps.version.outputs.version }}.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-turn-v${{ steps.version.outputs.version }}
        path: ui/build/outputs/apk/release/*.apk
